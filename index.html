<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa de Canales de Cristian Dias Trochez XD</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { 
            background: #0b0b0b; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        
        /* Banner de Bienvenida Personalizado XD */
        #banner-bienvenida {
            background-color: #1a1a1a;
            color: white;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 2px solid #ff4757;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }

        #contenido-principal {
            display: flex;
            flex: 1;
            padding: 15px;
            overflow: hidden;
        }

        /* Lista de canales a la izquierda */
        #lista-canales { 
            width: 30%; 
            max-height: 100%; 
            overflow-y: auto; 
            background: #141414; 
            padding: 15px; 
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }
        
        #reproductor-contenedor { 
            width: 70%; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }

        h2 { 
            text-align: center; 
            color: #ff4757; 
            margin-top: 0; 
            font-size: 18px;
        }
        
        .canal-btn { 
            display: block; 
            width: 100%; 
            background: #222; 
            color: #fff; 
            border: 1px solid #333; 
            padding: 15px; 
            margin-bottom: 10px; 
            text-align: left; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: background 0.2s, transform 0.1s;
        }
        
        .canal-btn:hover { 
            background: #ff4757; 
            transform: scale(1.03);
            border-color: #ff6b81;
        }

        .canal-btn.activo {
            background-color: #ff4757;
            font-weight: bold;
            border-color: #fff;
        }
        
        /* Reproductor de video ajustado */
        #reproductor-tv { 
            width: 100%; 
            border-radius: 10px; 
            background: #000; 
            box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div id="banner-bienvenida">
        📺 ¡Hola, Bienvenido! ⚽<br>
        al Programa de Canales de Cristian Dias Trochez XD
    </div>

    <div id="contenido-principal">
        <div id="lista-canales">
            <h2>Canales en Vivo (Automáticos)</h2>
            <div id="contenedor-botones-canales">
                <p style="text-align:center;">Cargando la lista de canales...</p>
            </div>
        </div>

        <div id="reproductor-contenedor">
            <video id="reproductor-tv" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        var player = videojs('reproductor-tv');
        
        // 🔥 ESTE ES EL TRUCO FINAL: Link de la lista comunitaria + tu control remoto 🔥
        // El script unirá ambas listas automáticamente.
        const URL_LISTA_COMUNITARIA = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';
        
        // ⚠️ IMPORTANTE: Aquí pondrás el link de TU lista personal en GitHub cuando la crees
        const URL_TU_CONTROL_REMOTO = 'AQUÍ_PONE_EL_LINK_DE_TU_ARCHIVO_M3U_EN_GITHUB'; 

        async function cargarTodasLasListas() {
            try {
                const contenedor = document.getElementById('contenedor-botones-canales');
                contenedor.innerHTML = ''; // Limpiamos el cargando

                // 1. Cargar canales de TU control remoto personal (Secreto #2)
                if (URL_TU_CONTROL_REMOTO.startsWith('http')) {
                    const h3Personal = document.createElement('h3');
                    h3Personal.innerText = "⭐ Tus Canales Propios (Manuales)";
                    h3Personal.style.color = "#ff6b81";
                    h3Personal.style.fontSize = "16px";
                    contenedor.appendChild(h3Personal);
                    await parsearM3U(URL_TU_CONTROL_REMOTO, contenedor);
                    
                    const hr = document.createElement('hr');
                    hr.style.borderColor = "#333";
                    hr.style.margin = "15px 0";
                    contenedor.appendChild(hr);
                }

                // 2. Cargar canales de la lista comunitaria automática (Secreto #1)
                const h3Comunitaria = document.createElement('h3');
                h3Comunitaria.innerText = "🌐 Canales Comunitarios (Automáticos)";
                h3Comunitaria.style.color = "#479fff";
                h3Comunitaria.style.fontSize = "16px";
                contenedor.appendChild(h3Comunitaria);
                await parsearM3U(URL_LISTA_COMUNITARIA, contenedor);

            } catch (error) {
                console.error("Error al cargar las listas:", error);
                document.getElementById('contenedor-botones-canales').innerHTML = '<p style="text-align:center; color:#ff4757;">Error al cargar canales. Revisa los links.</p>';
            }
        }

        async function parsearM3U(url, contenedor) {
            const respuesta = await fetch(url);
            const texto = await respuesta.text();
            const lineas = texto.split('\n');
            let nombreCanal = '';

            lineas.forEach(linea => {
                if (linea.startsWith('#EXTINF:')) {
                    // Extraer nombre del canal, limpiando el texto
                    nombreCanal = linea.split(',')[1] || 'Canal sin nombre';
                    nombreCanal = nombreCanal.trim();
                } else if (linea.startsWith('http')) {
                    let urlCanal = linea.trim();
                    // Crear el botón en automático
                    if (nombreCanal) {
                        let boton = document.createElement('button');
                        boton.className = 'canal-btn';
                        boton.innerText = nombreCanal;
                        boton.onclick = function() {
                            // Cambiar canal y play
                            player.src({ type: 'application/x-mpegURL', src: urlCanal });
                            player.play();
                            
                            // Resaltar botón activo
                            const botones = contenedor.querySelectorAll('.canal-btn');
                            botones.forEach(b => b.classList.remove('activo'));
                            this.classList.add('activo');
                        };
                        contenedor.appendChild(boton);
                        nombreCanal = ''; // Limpiar para el siguiente
                    }
                }
            });
        }

        cargarTodasLasListas();
    </script>
</body>
</html>
