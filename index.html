<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTIÓN DE DISPOSITIVOS - CRISTIAN</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body {
            background: #0d0f14;
            color: #fff;
            font-family: monospace;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* PANTALLA DE CONTROL DE ACCESO (LOGIN) */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #090a0f; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: #141824; border: 2px solid #ff4757; padding: 30px;
            border-radius: 8px; text-align: center; box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }
        .login-box input {
            background: #1a1f2c; border: 1px solid #3b4252; color: #00ff9d;
            padding: 10px; text-align: center; font-size: 16px; border-radius: 4px; margin-bottom: 15px; width: 80%;
        }
        .login-box button {
            background: #ff4757; color: white; border: none; padding: 10px 20px;
            cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase;
        }
        .login-box button:hover { background: #ff6b81; }

        /* INTERFAZ PRINCIPAL */
        #banner-tecnico {
            background: linear-gradient(135deg, #161a24 0%, #0f111a 100%);
            border-bottom: 2px solid #00bfff; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .titulo-principal { font-size: 20px; color: #00bfff; font-weight: bold; }
        .status-online { color: #00ff9d; font-size: 12px; }

        #main-layout { display: flex; flex: 1; padding: 10px; gap: 10px; overflow: hidden; }
        #panel-canales { width: 30%; background: #141824; border-radius: 6px; padding: 15px; display: flex; flex-direction: column; border: 1px solid #232838; }
        #lista-botones { flex: 1; overflow-y: auto; }
        .canal-btn { display: block; width: 100%; background: #1e2330; color: #fff; border: 1px solid #2d3446; padding: 12px; margin-bottom: 8px; border-radius: 4px; text-align: left; cursor: pointer; }
        .canal-btn:hover { border-color: #00bfff; background: #252b3a; }
        .canal-btn.active { background: #ff4757; border-color: #ff6b81; font-weight: bold; }

        #panel-video { width: 70%; background: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; border: 1px solid #232838; }
        #reproductor-tv { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <div class="login-box">
            <h2 style="color: #ff4757; margin-top: 0;">SISTEMA CENTRAL DE DISPOSITIVOS</h2>
            <p style="color: #8a99ad; font-size: 13px;">INGRESE SU CLAVE DE ABONADO PARA ACTIVAR SEÑAL</p>
            <input type="text" id="clave-cliente" placeholder="CLAVE DE ACCESO">
            <br>
            <button onclick="verificarAcceso()">CONECTAR TERMINAL</button>
            <p id="error-msg" style="color: #ff4757; font-size: 12px; margin-top: 10px; display: none;">⚠️ CLAVE INVÁLIDA O CORTE POR FALTA DE PAGO</p>
        </div>
    </div>

    <div id="banner-tecnico">
        <div class="titulo-principal">SISTEMA MULTI-STREAM // CRISTIAN DIAS</div>
        <div class="status-online">● TERMINAL CONECTADA EXITOSAMENTE</div>
    </div>

    <div id="main-layout">
        <div id="panel-canales">
            <p style="color: #ff4757; font-weight: bold; margin-top: 0; font-size: 12px;">[ ENLACES VERIFICADOS ]</p>
            <div id="lista-botones">Cargando frecuencias de red...</div>
        </div>
        <div id="panel-video">
            <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video-js.js"></script>
    <script>
        // ===================================================
        // 🔑 BASE DE DATOS DE CLIENTES ACTIVADOS
        // ===================================================
        const CLIENTES_ACTIVOS = [
            'CRISTIAN2026',    // Tu clave maestra de administrador
            'PASS TV'          // Clave para la tele de Sandra
        ];

        var player = videojs('reproductor-tv', { fluid: true });
        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';

        // COMPROBACIÓN AUTOMÁTICA AL INICIAR LA PÁGINA
        window.onload = function() {
            const claveGuardada = localStorage.getItem('mi_clave_tv');
            
            if (claveGuardada && CLIENTES_ACTIVOS.includes(claveGuardada)) {
                // Si ya tiene clave válida guardada, entra directo sin preguntar
                document.getElementById('pantalla-bloqueo').style.display = 'none';
                cargarCanales();
            }
            // Si no hay clave o la que estaba guardada la borraste de GitHub, se queda bloqueado pidiendo clave
        };

        function verificarAcceso() {
            const inputClave = document.getElementById('clave-cliente').value.trim().toUpperCase();
            
            if (CLIENTES_ACTIVOS.includes(inputClave)) {
                // Guarda la clave en la memoria del televisor para siempre
                localStorage.setItem('mi_clave_tv', inputClave);
                
                document.getElementById('pantalla-bloqueo').style.display = 'none';
                cargarCanales();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        async function cargarCanales() {
            try {
                const contenedor = document.getElementById('lista-botones');
                const respuesta = await fetch(URL_M3U);
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                
                contenedor.innerHTML = '';
                let nombreCanal = '';

                lineas.forEach(linea => {
                    if (linea.startsWith('#EXTINF:')) {
                        nombreCanal = linea.split(',')[1] || 'Canal';
                    } else if (linea.startsWith('http')) {
                        let urlCanal = linea.trim();
                        if (nombreCanal) {
                            let boton = document.createElement('button');
                            boton.className = 'canal-btn';
                            boton.innerText = `> STREAM: ${nombreCanal.trim()}`;
                            
                            boton.onclick = function() {
                                player.src({ type: 'application/x-mpegURL', src: urlCanal });
                                player.play();
                                document.querySelectorAll('.canal-btn').forEach(b => b.classList.remove('active'));
                                this.classList.add('active');
                            };
                            contenedor.appendChild(boton);
                            nombreCanal = '';
                        }
                    }
                });
            } catch (e) {
                document.getElementById('lista-botones').innerHTML = 'Error de red en matriz.';
            }
        }
    </script>
</body>
</html>
