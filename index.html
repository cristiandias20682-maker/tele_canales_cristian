<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Canales de Cristian Dias Trochez</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body {
            background: #111116;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* BANNER TECNOLÓGICO PREMIUM */
        #banner-tecnico {
            background: linear-gradient(135deg, #1e2530 0%, #131722 100%);
            border: 2px solid #00bfff;
            border-radius: 8px;
            margin: 15px 15px 5px 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        #banner-tecnico::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 80% 50%, rgba(0, 191, 255, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .texto-container {
            flex: 1;
        }

        .titulo-principal {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0 0 5px 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .subtitulo-bienvenida {
            font-size: 16px;
            color: #00ff9d;
            margin: 0;
            font-weight: 600;
        }

        .tag-sistema {
            font-family: monospace;
            font-size: 12px;
            color: #8a99ad;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #2d3748;
            display: inline-block;
            margin-top: 8px;
        }

        .tv-icon-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00bfff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 35px;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #main-layout {
            display: flex;
            flex: 1;
            padding: 10px 15px 15px 15px;
            gap: 15px;
            overflow: hidden;
        }

        #panel-canales {
            width: 30%;
            background: #161a24;
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #252d3d;
        }

        .seccion-titulo {
            color: #ff4757;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .seccion-titulo.web-directa {
            color: #00ff9d;
            margin-top: 10px;
        }

        .subseccion-titulo {
            color: #00bfff;
            font-size: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #panel-externo {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed #2d3748;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        #lista-botones {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .canal-btn {
            display: block;
            width: 100%;
            background: #202634;
            color: #edf2f7;
            border: 1px solid #2d3748;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .canal-btn:hover {
            background: #2b354a;
            border-color: #00bfff;
            transform: translateX(2px);
        }

        .btn-oficial {
            background: linear-gradient(135deg, #0052d4 0%, #4364f7 50%, #6fb1fc 100%);
            color: white;
            border: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-oficial:hover {
            background: linear-gradient(135deg, #4364f7 0%, #6fb1fc 100%);
            border-color: transparent;
        }

        .canal-btn.active {
            background: #ff4757;
            color: #fff;
            border-color: #ff6b81;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }

        #panel-video {
            width: 70%;
            background: #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #252d3d;
        }

        #reproductor-tv {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #161a24; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00bfff; }
    </style>
</head>
<body>

    <div id="banner-tecnico">
        <div class="texto-container">
            <div class="titulo-principal">Sistema de Canales de Cristian Dias Trochez</div>
            <div class="subtitulo-bienvenida">¡Hola, Bienvenido!</div>
            <div class="tag-sistema">[ DATA_STREAMS / HONDURAS ]</div>
        </div>
        <div class="tv-icon-container">📺</div>
    </div>

    <div id="main-layout">
        <div id="panel-canales">
            <div class="seccion-titulo web-directa">⚽ SEÑAL OFICIAL MUNDIAL</div>
            <div class="subseccion-titulo">🚀 Transmisión Web (Sin Bloqueos)</div>
            <div id="panel-externo">
                <button class="canal-btn btn-oficial" onclick="window.open('https://www.televicentro.com', '_blank')">📺 Ver CANAL 5 (Oficial)</button>
                <button class="canal-btn btn-oficial" style="background: #ff4757;" onclick="window.open('https://www.deportestvc.com', '_blank')">🔥 Ver DEPORTES TVC</button>
            </div>

            <div class="seccion-titulo">Canales en Vivo (Filtrados)</div>
            <div class="subseccion-titulo">🌐 Canales Activos y Estables</div>
            <div id="lista-botones">
                <p style="color: #718096; font-size: 13px;">Sincronizando frecuencias limpias...</p>
            </div>
        </div>

        <div id="panel-video">
            <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        var player = videojs('reproductor-tv', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2]
        });
        
        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';

        // Lista de canales exactos que me pediste eliminar por completo
        const canalesABorrar = [
            "alfa & omega vision", "aviva tv", "campus tv", 
            "canal 5 el líder", "canal 7 talanga visión", 
            "canal 32 sto", "cholusat sur 36", "deportes tvc", 
            "cva tv", "edn tv", "girasol tv", "globo tv", 
            "inmaculada tv", "la 98.1 tv", "litoral atlántico", 
            "ltv", "maya tv"
        ];

        // Canales de repuesto 100% funcionales y estables para rellenar
        const canalesExtra = [
            { nombre: "⭐ HCH En Vivo", url: "https://hch.tv/live/stream.m3u8" },
            { nombre: "⭐ Teleprogreso HD", url: "http://162.248.55.132:1935/teleprogreso/live/playlist.m3u8" },
            { nombre: "⭐ Suyapa TV (Noticias)", url: "https://5b12165037d04.streamlock.net/suyapatv/suyapatv/playlist.m3u8" },
            { nombre: "⭐ Canal 6 Honduras", url: "https://stream.canal6.hn/live/canal6.m3u8" }
        ];

        async function cargarCanales() {
            try {
                const contenedor = document.getElementById('lista-botones');
                const respuesta = await fetch(URL_M3U);
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                
                contenedor.innerHTML = '';
                
                // 1. Primero metemos los canales estables de repuesto
                canalesExtra.forEach(canal => {
                    crearBotonCanal(canal.nombre, canal.url, contenedor);
                });

                let nombreCanal = '';

                // 2. Cargamos la lista de internet saltándonos los que me pediste borrar
                lineas.forEach(linea => {
                    if (linea.startsWith('#EXTINF:')) {
                        nombreCanal = linea.split(',')[1] || 'Canal de Transmisión';
                        nombreCanal = nombreCanal.trim();
                    } else if (linea.startsWith('http')) {
                        let urlCanal = linea.trim();
                        if (nombreCanal) {
                            // Convertimos a minúsculas para comprobar si está en la lista negra
                            let nombreMin = nombreCanal.toLowerCase();
                            let deberiaBorrar = canalesABorrar.some(canal => nombreMin.includes(canal));

                            if (!deberiaBorrar) {
                                crearBotonCanal(nombreCanal, urlCanal, contenedor);
                            }
                            nombreCanal = '';
                        }
                    }
                });

            } catch (error) {
                console.error("Error cargando streams:", error);
                document.getElementById('lista-botones').innerHTML = '<p style="color:#ff4757;">Error al conectar con el servidor de canales.</p>';
            }
        }

        function crearBotonCanal(nombre, url, contenedor) {
            let boton = document.createElement('button');
            boton.className = 'canal-btn';
            boton.innerText = nombre;
            
            boton.onclick = function() {
                player.src({ type: 'application/x-mpegURL', src: url });
                player.play();
                
                const botones = contenedor.querySelectorAll('.canal-btn');
                botones.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            };
            
            contenedor.appendChild(boton);
        }

        cargarCanales();
    </script>
</body>
</html>
