<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid TV - Cristian Dias Trochez</title>
    
    <link rel="manifest" href='data:application/json,{"name":"Liquid TV","short_name":"LiquidTV","start_url":"./index.html","display":"standalone","background_color":"#0a111e","theme_color":"#00ff9d","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3736/3736534.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-gradiente: radial-gradient(circle at 50% 30%, #0a111e 0%, #05070b 100%);
            --liquid-bg: linear-gradient(135deg, rgba(25, 36, 56, 0.45) 0%, rgba(13, 19, 31, 0.7) 100%);
            --liquid-bg-hover: linear-gradient(135deg, rgba(35, 52, 82, 0.6) 0%, rgba(18, 27, 46, 0.85) 100%);
            --neon-cyan: 0 0 20px rgba(0, 191, 255, 0.4);
            --neon-verde: 0 0 25px rgba(0, 255, 157, 0.6);
            --text-main: #f7fafc;
        }

        body { background: var(--bg-gradiente); color: var(--text-main); font-family: sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* Estructura de Navegación Vertical */
        #control-vertical-tv { position: fixed; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 1000; background: rgba(10, 15, 24, 0.6); padding: 8px; border-radius: 20px; }
        .btn-control-total { background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        
        .contenido-principal { padding-left: 80px; padding-right: 20px; }
        #contenedor-reproductor { width: 100%; max-width: 1100px; margin: 20px 0; background: #000; border-radius: 24px; border: 2px solid rgba(255,255,255,0.08); }
        
        /* Grid de Canales */
        .grid-cuadros { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; width: 100%; }
        .card-canal { background: var(--liquid-bg); border-radius: 18px; padding: 15px; width: 190px; height: 80px; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; }
        .card-canal:hover { background: var(--liquid-bg-hover); border-color: #00ff9d; transform: scale(1.05); }
        
        /* Controles de Navegación */
        .controles-tv-carrusel { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-tv-flecha { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 8px 20px; border-radius: 10px; cursor: pointer; }

        /* Dock Apps */
        #dock-apps { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(20, 28, 43, 0.9); padding: 10px 20px; border-radius: 25px; display: flex; gap: 15px; z-index: 9999; }
        .app-icono { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="control-vertical-tv">
        <button class="btn-control-total" onclick="window.scrollTo(0,0)">▲</button>
        <button class="btn-control-total" onclick="document.getElementById('sec-nacionales').scrollIntoView()">▼</button>
    </div>

    <div class="contenido-principal">
        <h1>SISTEMA DE CANALES DE CRISTIAN DIAS TROCHEZ</h1>
        <div id="contenedor-reproductor">
            <video id="reproductor-tv" class="video-js vjs-default-skin" controls preload="auto" width="100%"></video>
        </div>

        <div id="sec-nacionales">
            <div class="controles-tv-carrusel">
                <button class="btn-tv-flecha" onclick="document.getElementById('grid').scrollBy(-300,0)">◀ IZQ</button>
                <button class="btn-tv-flecha" onclick="document.getElementById('grid').scrollBy(300,0)">DER ▶</button>
            </div>
            <div class="grid-cuadros" id="grid"></div>
        </div>
    </div>

    <div id="dock-apps">
        <div class="app-icono" style="background: #ff0000;" onclick="window.open('https://www.youtube.com', '_blank')">YT</div>
        <div class="app-icono" style="background: #e50914;" onclick="window.open('https://www.netflix.com', '_blank')">N</div>
        <div class="app-icono" style="background: #00a8e1;" onclick="window.open('https://www.primevideo.com', '_blank')">PV</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor-tv', { fluid: true });
        
        async function cargar() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const lines = data.split('\n');
            const grid = document.getElementById('grid');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const nombre = lines[i].split(',')[1];
                    const url = lines[i+1];
                    const card = document.createElement('div');
                    card.className = 'card-canal';
                    card.innerHTML = `<strong>${nombre}</strong>`;
                    card.onclick = () => {
                        player.src({ type: 'application/x-mpegURL', src: url });
                        player.play();
                    };
                    grid.appendChild(card);
                }
            }
        }

        // Service Worker básico para que funcione como App instalable
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request))})');
        }

        window.onload = cargar;
    </script>
</body>
</html>
