<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Canales de Cristian Dias Trochez</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-glass: rgba(33, 38, 46, 0.75);
            --bg-card: rgba(43, 50, 61, 0.85);
            --bg-card-hover: rgba(58, 67, 81, 0.95);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-main: #edf2f7;
            --text-sub: #a0aec0;
            --verde-neon: #00ff9d;
            --azul-premium: #2b6cb0;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #1e2530 0%, #0f1319 70%, #0a0c0f 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ENCABEZADO INTEGRADO PREMIUM */
        #header-sistema {
            padding: 25px 4% 10px 4%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .titulo-marca {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0;
        }

        .sub-tag {
            font-size: 13px;
            color: var(--verde-neon);
            margin-top: 4px;
            font-weight: 500;
        }

        .info-locacion {
            text-align: right;
            font-size: 12px;
            color: var(--text-sub);
            line-height: 1.5;
        }

        /* REPRODUCTOR INTEGRADO OCULTO QUE APARECE AL DAR PLAY */
        #contenedor-reproductor {
            width: 92%;
            max-width: 1100px;
            margin: 10px auto 20px auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: none;
        }
        #contenedor-reproductor.activo {
            display: block;
        }

        /* SECCIONES Y CONTENEDORES DE FILAS */
        .seccion-interfaz {
            padding: 5px 4% 20px 4%;
        }

        .titulo-fila {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .titulo-fila.mundial { color: #48bb78; }
        .titulo-fila.canales { color: #3182ce; }
        .titulo-fila.secundaria { color: #718096; margin-top: 15px;}

        /* REJILLAS DE TARJETAS ALINEADAS COMO LA FOTO */
        .grid-tv Bro {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 14px;
        }

        /* DISEÑO EXACTO DE LAS TARJETAS (CARDS) DE LA FOTO */
        .card-canal {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 14px;
            padding: 22px 14px;
            text-align: left;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 58px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 4px 10px rgba(0,0,0,0.15);
        }

        .card-canal:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* BORDE ARCOÍRIS BRILLANTE PARA EL CANAL SELECCIONADO (DIOS TE VE KIDS EN LA FOTO) */
        .card-canal.activo {
            background: #1e242e;
            box-shadow: 0 0 0 2px #00ff9d, 0 8px 25px rgba(0, 255, 157, 0.2);
        }

        /* TEXTO DEL INTERIOR DE LA TARJETA */
        .canal-meta {
            font-size: 10px;
            color: #63b3ed;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .canal-titulo-texto {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
        }

        /* ETIQUETA DIAMANTE ROJA DE "LIVE" EN LA ESQUINA */
        .tag-live-premium {
            position: absolute;
            top: 10px;
            right: 12px;
            background: linear-gradient(135deg, #e53e3e 0%, #9b2c2c 100%);
            color: #ffffff;
            font-size: 8px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: 0 2px 6px rgba(229, 62, 62, 0.4);
        }

        .tag-live-premium::before {
            content: '♦';
            color: #fff;
            font-size: 7px;
        }

        /* BOTONES SUPERIORES DEL MUNDIAL DE LA FOTO */
        .card-mundial {
            background: linear-gradient(135deg, #2b4c7e 0%, #1a365d 100%);
            border: 1px solid rgba(66, 153, 225, 0.3);
        }
        .card-mundial.tvc {
            background: linear-gradient(135deg, #9b2c2c 0%, #651a1a 100%);
            border: 1px solid rgba(229, 62, 62, 0.3);
        }

        /* MENÚ DE APPS INFERIOR FLOTANTE (ESTILO ANDROID TV) */
        #dock-apps {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 25, 33, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 8px 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
        }

        .app-icono {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .app-icono:hover { transform: scale(1.15); }

        /* RELLENO INFERIOR PARA QUE EL MENÚ FLOTANTE NO TAPE NADA */
        .espacio-final { height: 90px; }
    </style>
</head>
<body>

    <div id="header-sistema">
        <div>
            <h1 class="titulo-marca">SISTEMA DE CANALES DE CRISTIAN DIAS TROCHEZ</h1>
            <div class="sub-tag">¡Hola, Bienvenido!</div>
        </div>
        <div class="info-locacion">
            Locación: Contenido<br>
            <span style="color:var(--text-sub)">[ DATA_STREAMS / HONDURAS ]</span>
        </div>
    </div>

    <div id="contenedor-reproductor">
        <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%"></video>
    </div>

    <div class="seccion-interfaz">
        <div class="titulo-fila mundial">⚽ SEÑAL OFICIAL MUNDIAL (WEB DIRECTA)</div>
        <div class="grid-tv Bro">
            <div class="card-canal card-mundial" onclick="window.open('https://www.televicentro.com', '_blank')">
                <span class="tag-live-premium" style="background: #2b6cb0;">WEB</span>
                <div class="canal-meta">Televicentro</div>
                <div class="canal-titulo-texto">Ver CANAL 5 (Oficial)</div>
            </div>
            <div class="card-canal card-mundial tvc" onclick="window.open('https://www.deportestvc.com', '_blank')">
                <span class="tag-live-premium">WEB</span>
                <div class="canal-meta">Deportes TVC</div>
                <div class="canal-titulo-texto">Ver DEPORTES TVC</div>
            </div>
        </div>
    </div>

    <div class="seccion-interfaz">
        <div class="titulo-fila canales">🌐 CANALES EN VIVO (AUTOMÁTICOS)</div>
        <div class="grid-tv Bro" id="contenedor-canales-dinamicos">
            </div>

        <div class="titulo-fila secundaria">🛋️ FILA POPULARES</div>
        <div class="grid-tv Bro">
            <div class="card-canal" style="opacity: 0.3; cursor: default;"><div class="canal-titulo-texto">—</div></div>
            <div class="card-canal" style="opacity: 0.3; cursor: default;"><div class="canal-titulo-texto">—</div></div>
            <div class="card-canal" style="opacity: 0.3; cursor: default;"><div class="canal-titulo-texto">—</div></div>
            <div class="card-canal" style="opacity: 0.3; cursor: default;"><div class="canal-titulo-texto">—</div></div>
        </div>
    </div>

    <div id="dock-apps">
        <div class="app-icono" style="background:#e50914;">N</div>
        <div class="app-icono" style="background:#ff0000;">YT</div>
        <div class="app-icono" style="background:#00a8e1;">Prime</div>
        <div class="app-icono" style="background:#4a5568; font-size:16px;">⚙️</div>
    </div>

    <div class="espacio-final"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        var player = videojs('reproductor-tv', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2]
        });
        
        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';

        // Filtro de exclusión de canales caídos
        const canalesABorrar = [
            "alfa & omega vision", "aviva tv", "campus tv", 
            "canal 5 el líder", "canal 7 talanga visión", 
            "canal 32 sto", "cholusat sur 36", "deportes tvc", 
            "cva tv", "edn tv", "girasol tv", "globo tv", 
            "inmaculada tv", "la 98.1 tv", "litoral atlántico", 
            "ltv", "maya tv"
        ];

        async function cargarCanales() {
            try {
                const contenedor = document.getElementById('contenedor-canales-dinamicos');
                const respuesta = await fetch(URL_M3U);
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                
                contenedor.innerHTML = '';
                let nombreCanal = '';

                lineas.forEach(linea => {
                    if (linea.startsWith('#EXTINF:')) {
                        nombreCanal = linea.split(',')[1] || 'Canal de Transmisión';
                        nombreCanal = nombreCanal.trim();
                    } else if (linea.startsWith('http')) {
                        let urlCanal = linea.trim();
                        if (nombreCanal) {
                            let nombreMin = nombreCanal.toLowerCase();
                            let deberiaBorrar = canalesABorrar.some(canal => nombreMin.includes(canal));

                            if (!deberiaBorrar) {
                                // Creación de la tarjeta estructurada
                                let card = document.createElement('div');
                                card.className = 'card-canal';
                                
                                let tagLive = document.createElement('span');
                                tagLive.className = 'tag-live-premium';
                                tagLive.innerText = 'LIVE';
                                card.appendChild(tagLive);

                                // Nombre corto superior (Meta tag)
                                let metaTag = document.createElement('div');
                                metaTag.className = 'canal-meta';
                                // Extrae la primera palabra o siglas para simular la red corporativa
                                metaTag.innerText = nombreCanal.split(' ')[0];
                                card.appendChild(metaTag);

                                // Nombre completo del canal
                                let tituloTexto = document.createElement('div');
                                tituloTexto.className = 'canal-titulo-texto';
                                tituloTexto.innerText = nombreCanal;
                                card.appendChild(tituloTexto);
                                
                                // Acción interactiva del reproductor
                                card.onclick = function() {
                                    const reproductorContenedor = document.getElementById('contenedor-reproductor');
                                    reproductorContenedor.classList.add('activo');
                                    
                                    player.src({ type: 'application/x-mpegURL', src: urlCanal });
                                    player.play();
                                    
                                    reproductorContenedor.scrollIntoView({ behavior: 'smooth' });

                                    const todasLasTarjetas = contenedor.querySelectorAll('.card-canal');
                                    todasLasTarjetas.forEach(t => t.classList.remove('activo'));
                                    this.classList.add('active'); // Aplica el resalte de la foto
                                };
                                
                                contenedor.appendChild(card);
                            }
                            nombreCanal = '';
                        }
                    }
                });

            } catch (error) {
                console.error("Error cargando la rejilla premium:", error);
                document.getElementById('contenedor-canales-dinamicos').innerHTML = '<p style="color:#e53e3e; padding:20px;">Error al enlazar frecuencias dinámicas.</p>';
            }
        }

        cargarCanales();
    </script>
</body>
</html>
