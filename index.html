<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Liquid IPTV - Cristian Dias Trochez</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        /* (Tu CSS se mantiene igual, no lo toco para no cambiar tu diseño) */
        :root {
            --bg-gradiente: radial-gradient(circle at 50% 30%, #0a111e 0%, #05070b 100%);
            --liquid-bg: linear-gradient(135deg, rgba(25, 36, 56, 0.45) 0%, rgba(13, 19, 31, 0.7) 100%);
            --liquid-bg-hover: linear-gradient(135deg, rgba(35, 52, 82, 0.6) 0%, rgba(18, 27, 46, 0.85) 100%);
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.15);
            --neon-cyan: 0 0 20px rgba(0, 191, 255, 0.4);
            --neon-verde: 0 0 25px rgba(0, 255, 157, 0.6);
            --text-main: #f7fafc;
            --text-sub: #90cdf4;
        }

        body { background: var(--bg-gradiente); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        
        #control-vertical-tv { position: fixed; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 10000; background: rgba(10, 15, 24, 0.6); padding: 8px; border-radius: 20px; }
        .btn-control-total { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; }
        
        .contenido-principal { padding-left: 75px; padding-right: 4%; }
        #contenedor-reproductor { width: 100%; max-width: 1100px; margin: 10px 0; background: #000; border-radius: 24px; overflow: hidden; }
        
        .grid-cuadros { display: flex; gap: 15px; width: 100%; overflow-x: auto; padding: 10px 0; }
        .card-canal { background: var(--liquid-bg); border-radius: 18px; padding: 18px 14px; width: 190px; height: 70px; flex-shrink: 0; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        .card-canal:hover { background: var(--liquid-bg-hover); border-color: #00ff9d; }
    </style>
</head>
<body>

    <div id="control-vertical-tv">
        <button class="btn-control-total" onclick="window.scrollTo(0,0)">▲</button>
        <button class="btn-control-total" onclick="document.getElementById('sec-nacionales').scrollIntoView()">▼</button>
    </div>

    <div class="contenido-principal">
        <h1>SISTEMA DE CANALES</h1>
        <div id="contenedor-reproductor">
            <video id="reproductor-tv" class="video-js" controls preload="auto" width="100%"></video>
        </div>

        <div class="seccion-interfaz" id="sec-nacionales">
            <div class="grid-cuadros" id="contenedor-canales-dinamicos">
                </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor-tv', { fluid: true });
        
        // Carga automática sin esperar clics
        async function iniciarSistema() {
            try {
                const respuesta = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                const contenedor = document.getElementById('contenedor-canales-dinamicos');

                for (let i = 0; i < lineas.length; i++) {
                    if (lineas[i].startsWith('#EXTINF:')) {
                        const nombre = lineas[i].split(',')[1];
                        const url = lineas[i+1];
                        
                        const card = document.createElement('div');
                        card.className = 'card-canal';
                        card.innerHTML = `<div>${nombre}</div>`;
                        card.onclick = () => {
                            player.src({ type: 'application/x-mpegURL', src: url });
                            player.play();
                        };
                        contenedor.appendChild(card);
                    }
                }
            } catch (e) { console.error("Error al cargar:", e); }
        }

        // Ejecutar apenas cargue la página
        window.onload = iniciarSistema;
    </script>
</body>
</html>
