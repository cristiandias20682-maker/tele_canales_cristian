<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Canales de Cristian Dias Trochez</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-glass: rgba(25, 32, 45, 0.65);
            --bg-glass-hover: rgba(40, 52, 74, 0.85);
            --liquid-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --cyan-glow: rgba(0, 191, 255, 0.4);
            --text-main: #edf2f7;
            --text-sub: #a0aec0;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #1a2230 0%, #0d1117 70%, #07090d 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            /* Renderizado de texto más rápido */
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        /* ENCABEZADO */
        #header-sistema {
            padding: 25px 4% 10px 4%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .titulo-marca {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0;
        }

        .sub-tag {
            font-size: 13px;
            color: #00ff9d;
            margin-top: 4px;
            font-weight: 500;
        }

        .info-locacion {
            text-align: right;
            font-size: 12px;
            color: var(--text-sub);
        }

        /* REPRODUCTOR */
        #contenedor-reproductor {
            width: 92%;
            max-width: 1100px;
            margin: 10px auto 20px auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--glass-shadow);
            display: none;
        }
        #contenedor-reproductor.activo {
            display: block;
        }

        /* SECCIONES */
        .seccion-interfaz {
            padding: 5px 4% 20px 4%;
        }

        .titulo-fila {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 15px;
        }
        .titulo-fila.mundial { color: #48bb78; }
        .titulo-fila.canales { color: #3182ce; }

        /* REJILLA ESTABLE FORZADA */
        .grid-cuadros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
            gap: 15px !important;
            width: 100%;
        }

        /* COMPONENTE INTERFAZ CON ALINEACIÓN GRÁFICA */
        .card-canal {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--liquid-border);
            border-radius: 14px;
            padding: 20px 15px;
            text-align: left;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-height: 65px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: var(--glass-shadow);
            
            /* Optimización de hardware para evitar parpadeos en TV */
            transform: translateZ(0);
            will-change: transform, border-color, box-shadow;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        background 0.2s ease, 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease;
        }

        .card-canal:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-3px) translateZ(0);
            border-color: rgba(0, 191, 255, 0.5);
            box-shadow: 0 8px 25px var(--cyan-glow);
        }

        /* CANAL ACTIVO */
        .card-canal.activo {
            border-color: #00ff9d !important;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3) !important;
            background: rgba(25, 45, 38, 0.8) !important;
        }

        .canal-meta {
            font-size: 10px;
            color: #63b3ed;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .canal-titulo-texto {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
        }

        /* ETIQUETA LIVE DIAMANTE */
        .tag-live-premium {
            position: absolute;
            top: 10px;
            right: 12px;
            background: linear-gradient(135deg, #e53e3e 0%, #9b2c2c 100%);
            color: #ffffff;
            font-size: 8px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: 0 2px 6px rgba(229, 62, 62, 0.4);
        }

        /* BOTONES MUNDIAL */
        .card-mundial {
            background: linear-gradient(135deg, rgba(43, 108, 176, 0.6) 0%, rgba(26, 54, 93, 0.7) 100%);
        }
        .card-mundial.tvc {
            background: linear-gradient(135deg, rgba(229, 62, 62, 0.6) 0%, rgba(155, 44, 44, 0.7) 100%);
        }

        /* DOCK FLOTANTE */
        #dock-apps {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            background: rgba(15, 22, 33, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 22px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 9999;
            will-change: transform;
        }

        .app-icono {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: translateZ(0);
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .app-icono:hover { 
            transform: scale(1.15) translateY(-3px) translateZ(0); 
        }

        .espacio-final { height: 110px; }
    </style>
</head>
<body>

    <div id="header-sistema">
        <div>
            <h1 class="titulo-marca">SISTEMA DE CANALES DE CRISTIAN DIAS TROCHEZ</h1>
            <div class="sub-tag">¡Hola, Bienvenido!</div>
        </div>
        <div class="info-locacion">
            Locación: Contenido<br>
            <span style="color:var(--text-sub)">[ DATA_STREAMS / HONDURAS ]</span>
        </div>
    </div>

    <div id="contenedor-reproductor">
        <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%"></video>
    </div>

    <div class="seccion-interfaz">
        <div class="titulo-fila mundial">⚽ SEÑAL OFICIAL MUNDIAL (WEB DIRECTA)</div>
        <div class="grid-cuadros">
            <div class="card-canal card-mundial" onclick="window.open('https://www.televicentro.com', '_blank')">
                <span class="tag-live-premium" style="background: #2b6cb0;">WEB</span>
                <div class="canal-meta">Televicentro</div>
                <div class="canal-titulo-texto">Ver CANAL 5 (Oficial)</div>
            </div>
            <div class="card-canal card-mundial tvc" onclick="window.open('https://www.deportestvc.com', '_blank')">
                <span class="tag-live-premium">WEB</span>
                <div class="canal-meta">Deportes TVC</div>
                <div class="canal-titulo-texto">Ver DEPORTES TVC</div>
            </div>
        </div>
    </div>

    <div class="seccion-interfaz">
        <div class="titulo-fila canales">🌐 CANALES EN VIVO (AUTOMÁTICOS)</div>
        <div class="grid-cuadros" id="contenedor-canales-dinamicos">
            </div>
    </div>

    <div id="dock-apps">
        <div class="app-icono" style="background: #ff0000;" onclick="window.open('https://www.youtube.com', '_blank')">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93 .502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </div>
        <div class="app-icono" style="background: #e50914;" onclick="window.open('https://www.netflix.com', '_blank')">
            <span style="font-weight:900; font-size:18px;">N</span>
        </div>
        <div class="app-icono" style="background: #00a8e1; font-size:11px; font-weight:bold;" onclick="window.open('https://www.primevideo.com', '_blank')">
            prime
        </div>
        <div class="app-icono" style="background: #2d3748; font-size: 18px;">
            ⚙️
        </div>
    </div>

    <div class="espacio-final"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor-tv', { fluid: true });
        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';

        const canalesABorrar = [
            "alfa & omega vision", "aviva tv", "campus tv", 
            "canal 5 el líder", "canal 7 talanga visión", 
            "canal 32 sto", "cholusat sur 36", "deportes tvc", 
            "cva tv", "edn tv", "girasol tv", "globo tv", 
            "inmaculada tv", "la 98.1 tv", "litoral atlántico", 
            "ltv", "maya tv"
        ];

        async function cargarCanales() {
            try {
                const contenedor = document.getElementById('contenedor-canales-dinamicos');
                const respuesta = await fetch(URL_M3U);
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                
                // Fragmento de memoria para optimizar la inyección DOM de golpe
                const fragmento = document.createDocumentFragment();
                let nombreCanal = '';

                for (let i = 0; i < lineas.length; i++) {
                    const linea = lineas[i].trim();
                    if (!linea) continue;

                    if (linea.startsWith('#EXTINF:')) {
                        nombreCanal = (linea.split(',')[1] || 'Canal').trim();
                    } else if (linea.startsWith('http')) {
                        if (nombreCanal) {
                            const nombreMin = nombreCanal.toLowerCase();
                            const deberiaBorrar = canalesABorrar.some(canal => nombreMin.includes(canal));

                            if (!deberiaBorrar) {
                                const card = document.createElement('div');
                                card.className = 'card-canal';
                                
                                const tagLive = document.createElement('span');
                                tagLive.className = 'tag-live-premium';
                                tagLive.innerText = 'LIVE';
                                card.appendChild(tagLive);

                                const metaTag = document.createElement('div');
                                metaTag.className = 'canal-meta';
                                metaTag.innerText = nombreCanal.split(' ')[0];
                                card.appendChild(metaTag);

                                const tituloTexto = document.createElement('div');
                                tituloTexto.className = 'canal-titulo-texto';
                                tituloTexto.innerText = nombreCanal;
                                card.appendChild(tituloTexto);
                                
                                const urlActual = linea;
                                card.onclick = function() {
                                    const reproductorContenedor = document.getElementById('contenedor-reproductor');
                                    reproductorContenedor.classList.add('activo');
                                    
                                    player.src({ type: 'application/x-mpegURL', src: urlActual });
                                    player.play();
                                    
                                    reproductorContenedor.scrollIntoView({ behavior: 'smooth' });

                                    const todasLasTarjetas = contenedor.querySelectorAll('.card-canal');
                                    for (let j = 0; j < todasLasTarjetas.length; j++) {
                                        todasLasTarjetas[j].classList.remove('activo');
                                    }
                                    this.classList.add('activo');
                                };
                                
                                fragmento.appendChild(card);
                            }
                            nombreCanal = '';
                        }
                    }
                }

                contenedor.innerHTML = '';
                contenedor.appendChild(fragmento);

            } catch (error) {
                console.error("Error al renderizar la rejilla optimizada:", error);
            }
        }

        // Carga inmediata asíncrona
        document.addEventListener('DOMContentLoaded', cargarCanales);
    </script>
</body>
</html>
