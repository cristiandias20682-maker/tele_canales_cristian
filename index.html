        /* BANNER TECNOLÓGICO PREMIUM */
        #banner-tecnico {

            margin: 15px 15px 5px 15px;
            padding: 20px;

            overflow: hidden;

        #banner-tecnico::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
