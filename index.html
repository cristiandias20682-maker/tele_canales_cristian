<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSOLA DE TRANSMISIÓN DE CRISTIAN DIAS TROCHEZ</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        /* Interfaz Táctica / Estilo Terminal */
        body { 
            background: #05070a; 
            color: #00ff9d; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* Banner Técnico Principal */
        #core-header {
            background-color: #0a0f1d;
            border-bottom: 2px solid #00ff9d;
            padding: 15px 20px;
            text-align: left;
            box-shadow: 0px 0px 15px rgba(0, 255, 157, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sys-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
        }

        .sys-status {
            font-size: 14px;
            color: #00bfff;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #main-workspace {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
            overflow: hidden;
        }

        /* Panel de Control de Canales (Izquierda) */
        #matrix-channels { 
            width: 30%; 
            max-height: 100%; 
            overflow-y: auto; 
            background: #0d1326; 
            padding: 15px; 
            border: 1px solid #00bfff;
            border-radius: 4px;
        }
        
        /* Monitor de Video (Derecha) */
        #monitor-feed { 
            width: 70%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #020408;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 4px;
        }

        .panel-label { 
            color: #00bfff; 
            margin-top: 0; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        
        /* Botones de Selección Táctica */
        .tactical-btn { 
            display: block; 
            width: 100%; 
            background: #111a30; 
            color: #00ff9d; 
            border: 1px solid #00bfff; 
            padding: 12px; 
            margin-bottom: 8px; 
            text-align: left; 
            cursor: pointer; 
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .tactical-btn:hover { 
            background: #00ff9d; 
            color: #05070a;
            box-shadow: 0px 0px 10px rgba(0, 255, 157, 0.6);
            font-weight: bold;
        }

        .tactical-btn.active {
            background: #00bfff;
            color: #05070a;
            border-color: #fff;
            font-weight: bold;
            box-shadow: 0px 0px 10px rgba(0, 191, 255, 0.6);
        }
        
        /* Ajuste del Módulo de Video */
        #reproductor-tv { 
            width: 100%; 
            border: 1px solid #00ff9d;
            background: #000; 
        }

        /* Barra de scroll personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1326; }
        ::-webkit-scrollbar-thumb { background: #00bfff; }
    </style>
</head>
<body>

    <div id="core-header">
        <div class="sys-title">📡 SISTEMA DE PROGRAMAS DE CANALES DE CRISTIAN DIAS TROCHEZ v2.0</div>
        <div class="sys-status">● ONLINE_FEED_CONNECTED</div>
    </div>

    <div id="main-workspace">
        <div id="matrix-channels">
            <div class="panel-label">[ DATA_STREAMS / HONDURAS ]</div>
            <div id="contenedor-botones-canales">
                <p style="color: #aaa;">Iniciando protocolos de enlace...</p>
            </div>
        </div>

        <div id="monitor-feed">
            <video id="reproductor-tv" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        var player = videojs('reproductor-tv');
        
        // Base de datos de canales automática (IPTV-ORG)
        const URL_LISTA_COMUNITARIA = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';
        const URL_TU_CONTROL_REMOTO = 'AQUÍ_PONE_EL_LINK_DE_TU_ARCHIVO_M3U_EN_GITHUB'; 

        async function cargarTodasLasListas() {
            try {
                const contenedor = document.getElementById('contenedor-botones-canales');
                contenedor.innerHTML = '';

                // Carga Automática de Streams
                await parsearM3U(URL_LISTA_COMUNITARIA, contenedor);

            } catch (error) {
                console.error("SYS_ERROR:", error);
                document.getElementById('contenedor-botones-canales').innerHTML = '<p style="color:#ff4757;">[CRITICAL_ERROR: FAIL_TO_LOAD_STREAMS]</p>';
            }
        }

        async function parsearM3U(url, contenedor) {
            const respuesta = await fetch(url);
            const texto = await respuesta.text();
            const lineas = texto.split('\n');
            let nombreCanal = '';

            lineas.forEach(linea => {
                if (linea.startsWith('#EXTINF:')) {
                    nombreCanal = linea.split(',')[1] || 'UNKNOWN_FEED';
                    nombreCanal = nombreCanal.trim();
                } else if (linea.startsWith('http')) {
                    let urlCanal = linea.trim();
                    if (nombreCanal) {
                        let boton = document.createElement('button');
                        boton.className = 'tactical-btn';
                        boton.innerText = `> LINK: ${nombreCanal}`;
                        boton.onclick = function() {
                            player.src({ type: 'application/x-mpegURL', src: urlCanal });
                            player.play();
                            
                            const botones = contenedor.querySelectorAll('.tactical-btn');
                            botones.forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                        };
                        contenedor.appendChild(boton);
                        nombreCanal = '';
                    }
                }
            });
        }

        cargarTodasLasListas();
    </script>
</body>
</html>
