<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Canales de Cristian Dias Trochez</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-principal: #0b0e14;
            --bg-tarjeta: #1a2232;
            --bg-hover: #26334d;
            --cyan-neon: #00bfff;
            --verde-neon: #00ff9d;
            --rojo-neon: #ff4757;
        }

        body {
            background-color: var(--bg-principal);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* BANNER INICIAL */
        #banner-tecnico {
            background: linear-gradient(135deg, #161f30 0%, #0b0e14 100%);
            border-bottom: 2px solid var(--cyan-neon);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 191, 255, 0.15);
        }

        .titulo-principal {
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .subtitulo-bienvenida {
            font-size: 14px;
            color: var(--verde-neon);
            margin: 3px 0 0 0;
            font-weight: 600;
        }

        /* CONTENEDOR DEL REPRODUCTOR FLOTANTE / INTEGRADO */
        #contenedor-reproductor {
            width: 94%;
            max-width: 1200px;
            margin: 20px auto 10px auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #252d3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Se muestra solo cuando se activa un canal */
        }

        #contenedor-reproductor.activo {
            display: block;
        }

        /* CONTENEDOR DE FILAS DE CANALES (ESTILO GOOGLE TV) */
        .seccion-tv {
            padding: 10px 4%;
            margin-bottom: 10px;
        }

        .fila-titulo {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fila-titulo.mundial { color: var(--verde-neon); }
        .fila-titulo.canales { color: var(--cyan-neon); }

        /* REJILLA HORIZONTAL */
        .grid-canales {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding-bottom: 10px;
        }

        /* TARJETAS DE CANALES (CARDS) */
        .canal-card {
            background: var(--bg-tarjeta);
            border: 1px solid #252d3d;
            border-radius: 10px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 70px;
            position: relative;
            overflow: hidden;
        }

        .canal-card:hover {
            transform: scale(1.05);
            background: var(--bg-hover);
            border-color: var(--cyan-neon);
            box-shadow: 0 5px 15px rgba(0, 191, 255, 0.2);
        }

        .canal-card.activo {
            border-color: var(--rojo-neon);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
            background: linear-gradient(135deg, #2c161e 0%, #1a0b10 100%);
        }

        .canal-nombre {
            font-size: 14px;
            font-weight: 600;
            color: #edf2f7;
            word-wrap: break-word;
            max-width: 100%;
        }

        /* BADGE DE "LIVE" EN LAS TARJETAS */
        .badge-live {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--rojo-neon);
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        /* BOTONES ESPECIALES PARA EL MUNDIAL (TOP) */
        .btn-mundial {
            background: linear-gradient(135deg, #0052d4 0%, #4364f7 100%);
            border: none;
        }
        .btn-mundial.tvc {
            background: linear-gradient(135deg, #b31217 0%, #e52d27 100%);
        }

        /* SCROLLBAR PREMIUM */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-principal); }
        ::-webkit-scrollbar-thumb { background: #252d3d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan-neon); }
    </style>
</head>
<body>

    <div id="banner-tecnico">
        <div>
            <div class="titulo-principal">Sistema de Canales de Cristian Dias Trochez</div>
            <div class="subtitulo-bienvenida">¡Hola, Bienvenido!</div>
        </div>
        <div style="font-size: 28px;">📺</div>
    </div>

    <div id="contenedor-reproductor">
        <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%"></video>
    </div>

    <div class="seccion-tv">
        <div class="fila-titulo mundial">⚽ SEÑAL OFICIAL MUNDIAL (Web Directa)</div>
        <div class="grid-canales">
            <div class="canal-card btn-mundial" onclick="window.open('https://www.televicentro.com', '_blank')">
                <span class="badge-live">WEB</span>
                <span class="canal-nombre">📺 Ver CANAL 5 (Oficial)</span>
            </div>
            <div class="canal-card btn-mundial tvc" onclick="window.open('https://www.deportestvc.com', '_blank')">
                <span class="badge-live">WEB</span>
                <span class="canal-nombre">🔥 Ver DEPORTES TVC</span>
            </div>
        </div>
    </div>

    <div class="seccion-tv">
        <div class="fila-titulo canales">🌐 CANALES EN VIVO (AUTOMÁTICOS)</div>
        <div class="grid-canales" id="contenedor-grid">
            </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        var player = videojs('reproductor-tv', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2]
        });
        
        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';

        // Tu lista de canales eliminados por fallas
        const canalesABorrar = [
            "alfa & omega vision", "aviva tv", "campus tv", 
            "canal 5 el líder", "canal 7 talanga visión", 
            "canal 32 sto", "cholusat sur 36", "deportes tvc", 
            "cva tv", "edn tv", "girasol tv", "globo tv", 
            "inmaculada tv", "la 98.1 tv", "litoral atlántico", 
            "ltv", "maya tv"
        ];

        async function cargarCanales() {
            try {
                const contenedor = document.getElementById('contenedor-grid');
                const respuesta = await fetch(URL_M3U);
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                
                contenedor.innerHTML = '';
                let nombreCanal = '';

                lineas.forEach(linea => {
                    if (linea.startsWith('#EXTINF:')) {
                        nombreCanal = linea.split(',')[1] || 'Canal de Transmisión';
                        nombreCanal = nombreCanal.trim();
                    } else if (linea.startsWith('http')) {
                        let urlCanal = linea.trim();
                        if (nombreCanal) {
                            let nombreMin = nombreCanal.toLowerCase();
                            let deberiaBorrar = canalesABorrar.some(canal => nombreMin.includes(canal));

                            if (!deberiaBorrar) {
                                // Crear la tarjeta estilo Smart TV
                                let card = document.createElement('div');
                                card.className = 'canal-card';
                                
                                // Añadir la etiqueta LIVE
                                let badge = document.createElement('span');
                                badge.className = 'badge-live';
                                badge.innerText = 'LIVE';
                                card.appendChild(badge);

                                // Añadir el texto del canal
                                let textoNombre = document.createElement('span');
                                textoNombre.className = 'canal-nombre';
                                textoNombre.innerText = nombreCanal;
                                card.appendChild(textoNombre);
                                
                                // Evento al hacer clic en la tarjeta
                                card.onclick = function() {
                                    // Activar y mostrar el reproductor de video arriba
                                    const reproductorContenedor = document.getElementById('contenedor-reproductor');
                                    reproductorContenedor.classList.add('activo');
                                    
                                    player.src({ type: 'application/x-mpegURL', src: urlCanal });
                                    player.play();
                                    
                                    // Hacer scroll automático suave hacia el reproductor para ver el canal
                                    reproductorContenedor.scrollIntoView({ behavior: 'smooth' });

                                    // Marcar tarjeta como activa
                                    const tarjetas = contenedor.querySelectorAll('.canal-card');
                                    tarjetas.forEach(t => t.classList.remove('activo'));
                                    this.classList.add('activo');
                                };
                                
                                contenedor.appendChild(card);
                            }
                            nombreCanal = '';
                        }
                    }
                });

            } catch (error) {
                console.error("Error cargando rejilla:", error);
                document.getElementById('contenedor-grid').innerHTML = '<p style="color:#ff4757;">Error al conectar con la señal.</p>';
            }
        }

        cargarCanales();
    </script>
</body>
</html>
